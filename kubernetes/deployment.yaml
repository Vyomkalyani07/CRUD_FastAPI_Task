apiVersion: apps/v1
kind: Deployment

metadata:
  name: patient-api-deployment

spec:
  template:
    metadata:
      labels:
        app: patient-api

    spec:
      containers:
        - name: fastapi-task-container
          image: fastapi_task:latest
          imagePullPolicy: Never

          ports:
            - containerPort: 8000

          resources:
            requests:
              cpu: "100m"

            limits:
              cpu: "200m"

  replicas: 2

  selector:
    matchLabels:
      app: patient-api